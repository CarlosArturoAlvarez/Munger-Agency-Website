<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Munger Agency — Protecting Your Life and Legacy</title>
    <link rel="icon" id="favicon" type="image/png" href="/munger-lion-white.png" />
    <script>
      (function () {
        var img = new Image();
        img.src = '/munger-lion-white.png';
        img.onload = function () {
          var c = document.createElement('canvas');
          c.width = img.width; c.height = img.height;
          var ctx = c.getContext('2d');
          // Draw tint color first
          ctx.fillStyle = '#001699';
          ctx.fillRect(0, 0, c.width, c.height);
          // Multiply with the white lion alpha — keeps shape, applies color
          ctx.globalCompositeOperation = 'destination-in';
          ctx.drawImage(img, 0, 0);
          var link = document.getElementById('favicon');
          link.href = c.toDataURL('image/png');
        };
      })();
    </script>
    <meta name="description" content="Munger Agency — Life insurance, legacy planning, and financial protection for families and businesses nationwide." />
    <meta name="author" content="Munger Agency" />

    <meta property="og:title" content="Munger Agency — Protecting Your Life and Legacy" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MungerAgency" />
